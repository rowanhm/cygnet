name: Build and release databases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2025.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Cache downloaded wordnet data
        uses: actions/cache@v4
        with:
          path: bin/
          key: wordnet-data-${{ hashFiles('build.sh') }}
          restore-keys: wordnet-data-

      - name: Download wordnet data
        run: bash build.sh --download-only

      - name: Build databases
        run: bash build.sh --build-only

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.value }}"
          git push origin "${{ steps.tag.outputs.value }}"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.value }}" \
            --title "Cygnet ${{ steps.tag.outputs.value }}" \
            --generate-notes \
            web/cygnet.db.gz \
            web/provenance.db.gz
