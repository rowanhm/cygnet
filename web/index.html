    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ========== RELATION MAPPINGS ==========
        // Map full DB relation names to short codes used by the UI
        const RELATION_TO_SHORT = {
            'antonym': 'ant', 'derivation': 'der', 'derivation_of': '-der',
            'pertainym': 'ptr', 'pertainym_of': '-ptr',
            'participle': 'prt', 'participle_of': '-prt',
            'hypernym': 'hyp', 'hyponym': '-hyp',
            'instance_hypernym': 'ihyp', 'instance_hyponym': '-ihyp',
            'mero_member': 'mmer', 'holo_member': '-mmer',
            'mero_part': 'pmer', 'holo_part': '-pmer',
            'mero_substance': 'smer', 'holo_substance': '-smer',
            'opposite': 'opp',
            'causes': 'cau', 'is_caused_by': '-cau',
            'entails': 'ent', 'is_entailed_by': '-ent',
        };

        const relationNames = {
            'ant': 'antonym', 'der': 'derivation', 'ptr': 'pertainym',
            'prt': 'participle', 'syn': 'synonym',
            'hyp': 'hypernym', 'ihyp': 'instance hypernym',
            'mmer': 'member meronym', 'pmer': 'part meronym', 'smer': 'substance meronym',
            'opp': 'opposite', 'cau': 'causes', 'ent': 'entails',
        };

        const relationColors = {
            'ant': '#ef4444', 'der': '#f59e0b', 'ptr': '#10b981',
            'prt': '#06b6d4', 'syn': '#10b981',
            'hyp': '#3b82f6', 'ihyp': '#6366f1',
            'mmer': '#8b5cf6', 'pmer': '#a855f7', 'smer': '#d946ef',
            'opp': '#ec4899', 'cau': '#f43f5e', 'ent': '#14b8a6',
        };

        const posToHumanReadable = {
            'NOUN': 'Noun', 'VERB': 'Verb', 'ADJ': 'Adjective', 'ADV': 'Adverb',
            'CONJ': 'Conjunction', 'ADP': 'Adposition', 'NREF': 'Non-referential', 'UNK': 'Unknown'
        };

        const remove_accents = (text) => text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

        // ========== DATABASE URLs ==========
        // Local dev (localhost): serve from web/ directory via run.sh
        // Production: fetch from the latest GitHub release assets
        const DB_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? ''
            : 'https://github.com/fcbond/cygnet/releases/latest/download/';

        // ========== SQL DATABASE LAYER ==========
        let _db = null;
        let _SQL = null;
        let _provDb = null;

        // Prepared statement cache
        const _stmtCache = {};
        function cachedExec(sql, params = []) {
            if (!_db) return [];
            try {
                const results = _db.exec(sql, params);
                if (!results || results.length === 0) return [];
                const { columns, values } = results[0];
                return values.map(row => {
                    const obj = {};
                    columns.forEach((col, i) => { obj[col] = row[i]; });
                    return obj;
                });
            } catch (e) {
                console.error('SQL error:', sql, params, e);
                return [];
            }
        }

        // Language code to name mapping (built from DB)
        let _langNames = {};
        let _langRowidToCode = {};

        function buildLangNames() {
            const hasName = cachedExec(`PRAGMA table_info(languages)`).some(c => c.name === 'name');
            const sql = hasName
                ? `SELECT rowid, code, name FROM languages ORDER BY code`
                : `SELECT rowid, code FROM languages ORDER BY code`;
            cachedExec(sql).forEach(r => {
                _langRowidToCode[r.rowid] = r.code;
                _langNames[r.code] = r.name || r.code.toUpperCase();
            });
        }

        const _SENSE_COLS = `s.rowid as sense_id, e.language_rowid as lang_rowid, syn.pos as pos,
                       f.form as lemma, s.sense_index as ind, syn.rowid as synset_id`;
        const _SENSE_JOINS = `FROM forms f
                JOIN entries e ON f.entry_rowid = e.rowid
                JOIN senses s ON s.entry_rowid = e.rowid
                JOIN synsets syn ON s.synset_rowid = syn.rowid`;

        function searchWordform(term) {
            const normalized = remove_accents(term.toLowerCase());
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS} ${_SENSE_JOINS}
                WHERE f.normalized_form = ?
                ORDER BY e.language_rowid, f.form
            `, [normalized]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchGlob(term) {
            const pattern = remove_accents(term.toLowerCase()).replace(/\*/g, '%').replace(/\?/g, '_');
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS} ${_SENSE_JOINS}
                WHERE f.normalized_form LIKE ? LIMIT 2000
            `, [pattern]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchByIli(term) {
            const norm = term.replace(/^cili\./, '');
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS}
                FROM synsets syn
                JOIN senses s ON s.synset_rowid = syn.rowid
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid AND f.rank = 0
                WHERE syn.ili = ?
                ORDER BY e.language_rowid, f.form
            `, [norm]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchDefinition(term, langCodes) {
            const params = [`%${term}%`];
            let langClause = '';
            if (langCodes && langCodes.size > 0) {
                const rowids = Object.entries(_langRowidToCode)
                    .filter(([, code]) => langCodes.has(code))
                    .map(([rowid]) => parseInt(rowid));
                if (rowids.length > 0) {
                    langClause = `AND d.language_rowid IN (${rowids.map(() => '?').join(',')})`;
                    params.push(...rowids);
                }
            }
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS}
                FROM definitions d
                JOIN synsets syn ON d.synset_rowid = syn.rowid
                JOIN senses s ON s.synset_rowid = syn.rowid
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid AND f.rank = 0
                WHERE d.definition LIKE ? ${langClause} LIMIT 2000
            `, params);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function detectSearchMode(term) {
            if (/^(cili\.)?i\d+$/.test(term)) return 'ili';
            if (term.startsWith('def:')) return 'definition';
            if (term.includes('*') || term.includes('?')) return 'glob';
            return 'exact';
        }

        function querySense(senseRowid) {
            const rows = cachedExec(`
                SELECT s.rowid as id, e.language_rowid as lang_rowid, e.pos as entry_pos,
                       syn.pos as pos, syn.rowid as c, s.sense_index as ind
                FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN synsets syn ON s.synset_rowid = syn.rowid
                WHERE s.rowid = ?
            `, [senseRowid]);
            if (rows.length === 0) return null;
            const r = rows[0];

            // Get lemma (rank 0) and variants (rank > 0)
            const forms = cachedExec(`
                SELECT rowid, form, rank FROM forms
                WHERE entry_rowid = (SELECT entry_rowid FROM senses WHERE rowid = ?)
                ORDER BY rank
            `, [senseRowid]);
            const lemmaForm = forms.find(f => f.rank === 0);
            const lemma = lemmaForm?.form || '';
            const variants = forms.filter(f => f.rank > 0).map(f => f.form);
            const pronunciations = lemmaForm ? cachedExec(`
                SELECT variety, pronunciation FROM pronunciations
                WHERE form_rowid = ? ORDER BY rowid
            `, [lemmaForm.rowid]) : [];

            // Get examples with annotations
            const examples = cachedExec(`
                SELECT e.rowid as example_rowid, e.example
                FROM examples e
                JOIN sense_examples se ON se.example_rowid = e.rowid
                WHERE se.sense_rowid = ?
            `, [senseRowid]);

            const ex = examples.map(ex => {
                const anns = cachedExec(`
                    SELECT start_offset, end_offset, sense_rowid
                    FROM example_annotations WHERE example_rowid = ?
                `, [ex.example_rowid]);
                // Build HTML with bolding for the current sense
                let text = ex.example;
                let parts = [];
                let lastIdx = 0;
                const sorted = anns.sort((a, b) => a.start_offset - b.start_offset);
                for (const ann of sorted) {
                    if (ann.start_offset > lastIdx) {
                        parts.push(text.substring(lastIdx, ann.start_offset));
                    }
                    const tokenText = text.substring(ann.start_offset, ann.end_offset);
                    if (ann.sense_rowid === senseRowid) {
                        parts.push(`<b>${tokenText}</b>`);
                    } else {
                        parts.push(tokenText);
                    }
                    lastIdx = ann.end_offset;
                }
                if (lastIdx < text.length) parts.push(text.substring(lastIdx));
                return parts.join('');
            });

            // Get sense relations
            const senseRels = cachedExec(`
                SELECT rt.type, sr.target_rowid as target, sr.rowid as rid
                FROM sense_relations sr
                JOIN relation_types rt ON sr.type_rowid = rt.rowid
                WHERE sr.source_rowid = ?
            `, [senseRowid]);
            const sr = senseRels.map(rel => ({
                t: RELATION_TO_SHORT[rel.type] || rel.type,
                to: rel.target,
                rid: rel.rid
            }));

            return {
                id: r.id.toString(),
                l: lemma,
                v: variants,
                p: pronunciations.length > 0 ? pronunciations : undefined,
                lg: _langRowidToCode[r.lang_rowid],
                c: r.c,
                ind: r.ind,
                ex: ex.length > 0 ? ex : undefined,
                sr: sr.length > 0 ? sr : undefined,
                ontological_category: r.pos
            };
        }

        function queryConcept(synsetRowid) {
            const rows = cachedExec(`
                SELECT rowid, ili, pos FROM synsets WHERE rowid = ?
            `, [synsetRowid]);
            if (rows.length === 0) return null;
            const r = rows[0];

            // Get definitions grouped by language
            const defs = cachedExec(`
                SELECT rowid as def_rowid, definition, language_rowid FROM definitions
                WHERE synset_rowid = ? ORDER BY language_rowid
            `, [synsetRowid]);
            const d = {};
            const dr = {};
            defs.forEach(def => {
                const lang = _langRowidToCode[def.language_rowid];
                d[lang] = def.definition;
                dr[lang] = def.def_rowid;
            });

            // Get definition annotations (for English)
            const enLangCode = Object.entries(_langRowidToCode).find(([_, code]) => code === 'en');
            const enLangRowid = enLangCode ? parseInt(enLangCode[0]) : null;
            const enDef = defs.find(def => def.language_rowid === enLangRowid);
            let da = undefined;
            if (enDef) {
                const anns = cachedExec(`
                    SELECT start_offset as so, end_offset as eo, sense_rowid as s
                    FROM definition_annotations WHERE definition_rowid = ?
                `, [enDef.def_rowid]);
                if (anns.length > 0) da = anns;
            }

            // Get senses grouped by language
            const senses = cachedExec(`
                SELECT s.rowid as sense_id, e.language_rowid
                FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                WHERE s.synset_rowid = ?
                ORDER BY e.language_rowid
            `, [synsetRowid]);
            const s = {};
            senses.forEach(sense => {
                const lang = _langRowidToCode[sense.language_rowid];
                if (!s[lang]) s[lang] = [];
                s[lang].push(sense.sense_id);
            });

            // Get concept relations
            const rels = cachedExec(`
                SELECT rt.type, sr.target_rowid as target, sr.rowid as rid
                FROM synset_relations sr
                JOIN relation_types rt ON sr.type_rowid = rt.rowid
                WHERE sr.source_rowid = ?
            `, [synsetRowid]);
            const cr = rels.map(rel => ({
                t: RELATION_TO_SHORT[rel.type] || rel.type,
                to: rel.target,
                rid: rel.rid
            }));

            return {
                oc: r.pos,
                ili: r.ili,
                d: Object.keys(d).length > 0 ? d : undefined,
                dr: Object.keys(dr).length > 0 ? dr : undefined,
                da,
                s: Object.keys(s).length > 0 ? s : undefined,
                cr: cr.length > 0 ? cr : undefined
            };
        }

        function findPath(fromId, toId) {
            if (fromId === toId) return [{ node: fromId, rel: null }];
            const MAX_DEPTH = 12;
            const visited = new Map([[fromId, { prev: null, rel: null }]]);
            let frontierArr = [fromId];
            let frontierSet = new Set([fromId]);
            for (let depth = 0; depth < MAX_DEPTH && frontierArr.length > 0; depth++) {
                const ph = frontierArr.map(() => '?').join(',');
                const rows = cachedExec(`
                    SELECT source_rowid as src, target_rowid as tgt, rt.type as rel
                    FROM synset_relations sr
                    JOIN relation_types rt ON sr.type_rowid = rt.rowid
                    WHERE source_rowid IN (${ph}) OR target_rowid IN (${ph})
                `, [...frontierArr, ...frontierArr]);
                const nextArr = [];
                const nextSet = new Set();
                let found = false;
                for (const {src, tgt, rel} of rows) {
                    for (const [node, neighbor] of [[src, tgt], [tgt, src]]) {
                        if (!frontierSet.has(node) || visited.has(neighbor)) continue;
                        visited.set(neighbor, { prev: node, rel });
                        if (neighbor === toId) { found = true; break; }
                        if (!nextSet.has(neighbor)) { nextArr.push(neighbor); nextSet.add(neighbor); }
                    }
                    if (found) break;
                }
                if (found) {
                    const path = [];
                    let cur = toId;
                    while (cur !== null) {
                        const { prev, rel } = visited.get(cur);
                        path.unshift({ node: cur, rel });
                        cur = prev;
                    }
                    return path;
                }
                frontierArr = nextArr;
                frontierSet = nextSet;
            }
            return null;
        }

        const _labelCache = {};
        function getConceptLabel(synsetRowid, lang = 'en') {
            const key = `${synsetRowid}-${lang}`;
            if (_labelCache[key] !== undefined) return _labelCache[key];
            const queryLang = `
                SELECT f.form FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid
                JOIN languages l ON e.language_rowid = l.rowid
                WHERE s.synset_rowid = ? AND l.code = ? AND f.rank = 0
                ORDER BY s.sense_index LIMIT 1`;
            const queryAny = `
                SELECT f.form, l.code as lang_code FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid
                JOIN languages l ON e.language_rowid = l.rowid
                WHERE s.synset_rowid = ? AND f.rank = 0
                ORDER BY s.sense_index LIMIT 1`;
            let rows = cachedExec(queryLang, [synsetRowid, lang]);
            if (rows.length > 0) {
                const result = { form: rows[0].form, lang };
                _labelCache[key] = result;
                return result;
            }
            if (lang !== 'en') {
                rows = cachedExec(queryLang, [synsetRowid, 'en']);
                if (rows.length > 0) {
                    const result = { form: rows[0].form, lang: 'en' };
                    _labelCache[key] = result;
                    return result;
                }
            }
            rows = cachedExec(queryAny, [synsetRowid]);
            const result = rows[0]?.form ? { form: rows[0].form, lang: rows[0].lang_code } : null;
            _labelCache[key] = result;
            return result;
        }

        function getAllLanguages() {
            const rows = cachedExec(`SELECT code FROM languages ORDER BY code`);
            return rows.map(r => r.code);
        }

        function queryResources() {
            const cols = new Set(cachedExec('PRAGMA table_info(resources)').map(c => c.name));
            const coverage = cols.has('synset_count')
                ? ', r.synset_count, r.sense_count'
                : ', null AS synset_count, null AS sense_count';
            return cachedExec(
                `SELECT r.code, r.version, r.label, l.code AS language,
                        r.url, r.citation, r.licence, r.email, r.status,
                        r.confidence_score, r.extra${coverage}
                 FROM resources r
                 LEFT JOIN languages l ON r.language_rowid = l.rowid
                 ORDER BY r.label`
            );
        }

        function queryStats() {
            const get = sql => { const r = cachedExec(sql); return r.length ? Object.values(r[0])[0] : 0; };
            return {
                synsets:   get(`SELECT COUNT(*) FROM synsets`),
                entries:   get(`SELECT COUNT(*) FROM entries`),
                senses:    get(`SELECT COUNT(*) FROM senses`),
                languages: get(`SELECT COUNT(DISTINCT language_rowid) FROM entries`),
            };
        }

        function cachedExecProv(sql, params = []) {
            if (!_provDb) return [];
            try {
                const results = _provDb.exec(sql, params);
                if (!results || results.length === 0) return [];
                const { columns, values } = results[0];
                return values.map(row => {
                    const obj = {};
                    columns.forEach((col, i) => { obj[col] = row[i]; });
                    return obj;
                });
            } catch (e) {
                console.error('Provenance SQL error:', sql, params, e);
                return [];
            }
        }

        function queryProvenance(tableName, itemRowid) {
            return cachedExecProv(
                `SELECT pr.code, p.version, p.original_id
                 FROM provenance p
                 JOIN prov_tables pt ON p.table_rowid = pt.rowid
                 JOIN prov_resources pr ON p.resource_rowid = pr.rowid
                 WHERE pt.name = ? AND p.item_rowid = ?`,
                [tableName, itemRowid]
            );
        }

        // ========== INDEXEDDB CACHE ==========
        const IDB_NAME = 'cygnet-cache';
        const IDB_STORE = 'blobs';

        function idbOpen() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IDB_NAME, 1);
                req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGet(key) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readonly');
                const req = tx.objectStore(IDB_STORE).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbPut(key, value) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).put(value, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbDel(key) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).delete(key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbClear() {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // ========== MAIN COMPONENT ==========

            const [selectedCategories, setSelectedCategories] = useState({});
            const [pathTargetIli, setPathTargetIli] = useState('');

            const [pathResult, setPathResult] = useState(null);
            const [pathNotFound, setPathNotFound] = useState(false);
            const isPopStateRef = useRef(false);
            const isInitialLoadRef = useRef(true);
            const hoverTimeoutRef = useRef(null);
            const isLoadingRelationsRef = useRef(false);
            const simulationRef = useRef(null);
            const svgRef = useRef(null);
            const gRef = useRef(null);
            const lastConceptRef = useRef(null);
            const setHoverMenuPositionRef = useRef(null);
            setHoverMenuPositionRef.current = setHoverMenuPosition;
            const menuRef = useRef(null);
            const menuInteractionRef = useRef(false);
            const settingsRef = useRef(null);
            const hoveredNodeRef = useRef(null);
            const nodeSizeCache = useRef(new Map());
            const MAX_CACHE_SIZE = 200;

            const addToCache = (key, value) => {
                const cache = nodeSizeCache.current;
                if (cache.size >= MAX_CACHE_SIZE) {
                    const firstKey = cache.keys().next().value;
                    cache.delete(firstKey);
                }
                cache.set(key, value);
            };

            useEffect(() => { hoveredNodeRef.current = hoveredNode; }, [hoveredNode]);

            useEffect(() => {
                if (!settingsOpen) return;

            // Initialize database

                        });

                        // Check IndexedDB cache, validating against server mtime
                        let buf;
                        try {
                            const cached = await idbGet('db');
                            if (cached) {
                                let stale = false;
                                try {
                                    const head = await fetch(DB_BASE + 'cygnet.db.gz', { method: 'HEAD' });
                                    const serverMtime = head.headers.get('last-modified') || head.headers.get('etag');
                                    const cachedMtime = await idbGet('db-mtime');
                                    if (serverMtime && serverMtime !== cachedMtime) stale = true;
                                } catch (_) { /* offline — trust cache */ }
                                if (stale) {
                                    setDbProgress('Database updated, clearing cache...');
                                    await Promise.all([idbDel('db'), idbDel('provdb'), idbDel('db-mtime')]);
                                } else {
                                    setDbProgress('Loading from cache...');
                                    buf = new Uint8Array(cached);
                                }
                            }
                        } catch (e) {
                            console.warn('IndexedDB cache read failed:', e);
                        }

                        if (!buf) {
                            // Fetch compressed database
                            setDbProgress('Downloading database...');
                            const response = await fetch(DB_BASE + 'cygnet.db.gz');
                            if (!response.ok) throw new Error(`Failed to fetch database: ${response.status}`);
                            const serverMtime = response.headers.get('last-modified') || response.headers.get('etag') || '';
                            const compressedTotal = parseInt(response.headers.get('content-length') || '0');

                            // Stream through DecompressionStream
                            const ds = new DecompressionStream('gzip');
                            const decompressedStream = response.body.pipeThrough(ds);
                            const reader = decompressedStream.getReader();

                            // We track compressed bytes via a wrapper on the original body
                            // But DecompressionStream consumes the body, so we track decompressed bytes
                            let loaded = 0;
                            const chunks = [];
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                chunks.push(value);
                                loaded += value.length;
                                if (compressedTotal > 0) {
                                    // Estimate: show decompressed MB (compressed size known for reference)
                                    setDbProgress('Downloading & decompressing...');
                                    setDownloadProgress({ loaded, total: null, compressedTotal });
                                } else {
                                    setDbProgress(`Decompressing... ${(loaded/1048576).toFixed(0)} MB`);
                                }
                            }

                            buf = new Uint8Array(loaded);
                            let offset = 0;
                            for (const chunk of chunks) {
                                buf.set(chunk, offset);
                                offset += chunk.length;
                            }
                            setDownloadProgress(null);

                            // Cache in IndexedDB
                            setDbProgress('Caching for next visit...');
                            try {
                                await idbPut('db', buf.buffer);
                                if (serverMtime) await idbPut('db-mtime', serverMtime);
                            } catch (e) {
                                console.warn('IndexedDB cache write failed:', e);
                            }
                        }

                        setDbProgress('Opening database...');
                        _SQL = SQL;
                        _db = new SQL.Database(buf);
                        buildLangNames();
                        setAllLanguages(getAllLanguages());
                        setAllResources(queryResources());
                        setDbStats(queryStats());
                        setDbReady(true);
                    } catch (e) {
                        console.error('DB init error:', e);
                        setDbError(e.message);
                    }
                })();

            const categorizeRelations = useCallback((relations) => {

                for (const relType in relations) {
                    const targets = relations[relType];
                    const isInverse = relType.startsWith('-');
                    const baseType = isInverse ? relType.substring(1) : relType;

                    if (baseType === 'hyp' || baseType === 'ihyp') {
                        if (isInverse) categories.hyponyms.push(...targets.map(t => ({ type: relType, target: t })));
                        else categories.hypernyms.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (baseType === 'mmer' || baseType === 'pmer' || baseType === 'smer') {
                        if (isInverse) categories.holonyms.push(...targets.map(t => ({ type: relType, target: t })));
                        else categories.meronyms.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (['aga','paa','rea','iag','iac','rag','pag','ipa','ire','pre'].includes(baseType)) {
                        categories.roles.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (baseType === 'cau' || baseType === 'ent') {
                        categories.inferences.push(...targets.map(t => ({ type: relType, target: t })));

                setTimeout(() => {
                const t = term.trim();

                const results = mode === 'ili'        ? searchByIli(t)
                              : mode === 'definition' ? searchDefinition(t.slice(4).trim(), lang)
                              : mode === 'glob'       ? searchGlob(t)

                const senseMap = {};

                    const sid = r.sense_id.toString();

                        l: r.lemma,

                let i = 0;
                const loadBatch = () => {

            const hasActiveSettings = definitionLanguage !== 'en' || !showPronunciation || showProvenance || languageFilter.size > 0 || posFilter.size > 0;

            // Concept graph

            const getAvailableCategories = (conceptId) => {

            const handleCategorySelect = (conceptId, category) => {
                const relations = relatedConcepts[conceptId];
                if (!relations || isLoadingRelationsRef.current) return;

                const newSelectedCategories = {...selectedCategories};
                if (!newSelectedCategories[conceptId]) newSelectedCategories[conceptId] = new Set();
                else newSelectedCategories[conceptId] = new Set(newSelectedCategories[conceptId]);

                if (newSelectedCategories[conceptId].has(category)) {
                    newSelectedCategories[conceptId].delete(category);
                    if (newSelectedCategories[conceptId].size === 0) delete newSelectedCategories[conceptId];
                } else {
                    newSelectedCategories[conceptId].add(category);
                }

                const newVisibleNodes = new Set([selectedConcept]);
                const queue = [selectedConcept];
                const processed = new Set();
                while (queue.length > 0) {
                    const currentId = queue.shift();
                    if (processed.has(currentId)) continue;
                    processed.add(currentId);
                    const catsForNode = newSelectedCategories[currentId];
                    if (!catsForNode || catsForNode.size === 0) continue;
                    const relationsForNode = relatedConcepts[currentId];

                    const categorizedRels = categorizeRelations(relationsForNode);
                    catsForNode.forEach(cat => {
                        if (categorizedRels[cat]) {
                            categorizedRels[cat].forEach(rel => {
                                if (!newVisibleNodes.has(rel.target)) {
                                    newVisibleNodes.add(rel.target);
                                    queue.push(rel.target);
                                }
                            });
                        }
                    });
                }

                setSelectedCategories(newSelectedCategories);
                setVisibleNodes(newVisibleNodes);

                if (simulationRef.current) simulationRef.current.stop();

                // Load missing nodes
                const nodesToLoad = Array.from(newVisibleNodes).filter(nid => !relatedConcepts[nid]);
                if (nodesToLoad.length > 0) {
                    isLoadingRelationsRef.current = true;
                    const updates = {};
                    nodesToLoad.forEach(nid => {
                        loadConcept(nid);
                        updates[nid] = loadConceptRelations(nid);
                    });
                    setRelatedConcepts(prev => ({...prev, ...updates}));
                    isLoadingRelationsRef.current = false;
                    if (simulationRef.current) simulationRef.current.alpha(0.2).restart();
                }
            };

            // D3 concept graph effect
            useEffect(() => {
                if (view !== 'concept' || !selectedConcept || !relatedConcepts[selectedConcept] || relationsView !== 'graph') return;

                const container = document.getElementById('concept-graph');
                if (!container) return;

                let rafId, timeoutId;
                timeoutId = setTimeout(() => {
                    const width = container.clientWidth;
                    const height = 500;

                    const isNewConcept = lastConceptRef.current !== selectedConcept;
                    lastConceptRef.current = selectedConcept;

                    // Build nodes and links
                    const nodesMap = new Map();
                    const linksArray = [];

                    const addNode = (id) => {
                        if (nodesMap.has(id)) return;
                        const concept = loadedConcepts[id] || loadConcept(id);
                        const pos = getPosName(concept?.oc || '');
                        const lblInfo = getConceptLabel(parseInt(id), definitionLanguage);
                        const labelBase = lblInfo?.form || concept?.d?.[definitionLanguage] || concept?.d?.en || '';
                        const labelActualLang = lblInfo?.lang;
                        const label = (labelActualLang && labelActualLang !== definitionLanguage)
                            ? `${labelBase} [${labelActualLang}]` : labelBase;
                        nodesMap.set(id, {
                            id, label, pos,
                            isCenter: id === selectedConcept
                        });
                    };

                    addNode(selectedConcept);
                    visibleNodes.forEach(nid => {
                        if (!nodesMap.has(nid)) addNode(nid);
                    });

                    // Build links from relations
                    visibleNodes.forEach(sourceId => {
                        const rels = relatedConcepts[sourceId];
                        if (!rels) return;
                        for (const relType in rels) {
                            rels[relType].forEach(targetId => {
                                if (visibleNodes.has(targetId)) {
                                    const shortCode = relType.startsWith('-') ? relType.substring(1) : relType;
                                    linksArray.push({
                                        source: sourceId, target: targetId,
                                        type: relType,
                                        color: relationColors[shortCode] || '#999'
                                    });
                                }
                            });
                        }
                    });

                    const nodesArray = Array.from(nodesMap.values());

                    // Reuse or create SVG
                    let svg = d3.select(container).select('svg');
                    if (svg.empty() || isNewConcept) {
                        d3.select(container).selectAll('*').remove();
                        svg = d3.select(container).append('svg')
                            .attr('width', width).attr('height', height)
                            .style('border', '1px solid #e5e7eb')
                            .style('border-radius', '0.5rem');
                        svgRef.current = svg;

                        const g = svg.append('g');
                        gRef.current = g;

                        const zoom = d3.zoom().scaleExtent([0.1, 4])
                            .on('zoom', (event) => g.attr('transform', event.transform));
                        svg.call(zoom);
                        svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.8));

                        g.append('g').attr('class', 'links');
                        g.append('g').attr('class', 'nodes');
                    }

                    const g = gRef.current;

                    // Force simulation
                    const edgeLengthForce = (alpha) => {
                        linksArray.forEach(link => {
                            const source = typeof link.source === 'object' ? link.source : nodesMap.get(link.source);
                            const target = typeof link.target === 'object' ? link.target : nodesMap.get(link.target);
                            if (!source || !target) return;
                            const dx = target.x - source.x;
                            const dy = target.y - source.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const desired = 200;
                            const strength = 0.1 * alpha;
                            const diff = (dist - desired) / dist * strength;
                            const mx = dx * diff * 0.5;
                            const my = dy * diff * 0.5;
                            source.x += mx; source.y += my;
                            target.x -= mx; target.y -= my;
                        });
                    };
                    edgeLengthForce.initialize = () => {};

                    let simulation = simulationRef.current;
                    if (!simulation || isNewConcept) {
                        if (simulation) simulation.stop();
                        simulation = d3.forceSimulation(nodesArray)
                            .force('charge', d3.forceManyBody().strength(-300))
                            .force('center', d3.forceCenter(0, 0).strength(0.05))
                            .force('collision', d3.forceCollide().radius(80))
                            .force('link', d3.forceLink(linksArray).id(d => d.id).distance(200).strength(0.3))
                            .force('edgeLength', edgeLengthForce);
                        simulationRef.current = simulation;
                    } else {
                        simulation.nodes(nodesArray);
                        simulation.force('link').links(linksArray);
                    }

                    simulation.on('tick', () => {
                        rafId = requestAnimationFrame(() => {
                            // Update links
                            const link = g.select('.links')
                                .selectAll('line').data(linksArray, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
                            link.enter().append('line')
                                .attr('stroke-width', 1.5).attr('stroke-opacity', 0.6)
                                .merge(link)
                                .attr('stroke', d => d.color)
                                .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                            link.exit().remove();

                            // Update nodes
                            const node = g.select('.nodes')
                                .selectAll('g.node').data(nodesArray, d => d.id);

                            const nodeEnter = node.enter().append('g').attr('class', 'node')
                                .style('cursor', 'pointer')
                                .call(d3.drag()
                                    .on('start', (event, d) => {
                                        if (!event.active) simulation.alphaTarget(0.1).restart();
                                        d.fx = d.x; d.fy = d.y;
                                    })
                                    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                                    .on('end', (event, d) => {
                                        if (!event.active) simulation.alphaTarget(0);
                                        d.fx = null; d.fy = null;
                                    })
                                )
                                .on('click', (event, d) => { if (!d.isCenter) handleConceptClick(d.id); })
                                .on('mouseenter', (event, d) => {
                                    if (hoverTimeoutRef.current) {
                                        clearTimeout(hoverTimeoutRef.current);
                                        hoverTimeoutRef.current = null;
                                    }
                                    setHoveredNode(d.id);
                                    const graphRect = container.getBoundingClientRect();
                                    const svgPoint = svg.node().createSVGPoint();
                                    const ctm = g.node().getCTM();
                                    svgPoint.x = d.x + (d.width || 100);
                                    svgPoint.y = d.y;
                                    const screenPoint = svgPoint.matrixTransform(ctm);
                                    setHoverMenuPositionRef.current({
                                        x: Math.min(screenPoint.x, width - 180),
                                        y: Math.max(0, Math.min(screenPoint.y, height - 200))
                                    });
                                })
                                .on('mouseleave', () => {
                                    hoverTimeoutRef.current = setTimeout(() => {
                                        if (!menuInteractionRef.current) {
                                            setHoveredNode(null);
                                            setHoverMenuPositionRef.current(null);
                                        }
                                    }, 200);
                                })
                                .each(function(d) {
                                    const nodeGroup = d3.select(this);
                                    const maxWidth = d.isCenter ? 250 : 200;
                                    const avgCharWidth = 7;
                                    const maxCharsPerLine = Math.floor(maxWidth / avgCharWidth);
                                    const labelWords = d.label.split(' ');
                                    const lines = [];
                                    let currentLine = '';
                                    labelWords.forEach(word => {
                                        if (currentLine.length + word.length + 1 <= maxCharsPerLine) {
                                            currentLine += (currentLine ? ' ' : '') + word;
                                        } else {
                                            if (currentLine) lines.push(currentLine);
                                            currentLine = word;
                                        }
                                    });
                                    if (currentLine) lines.push(currentLine);
                                    if (lines.length === 0) lines.push('');

                                    const padding = 12;
                                    const lineHeight = d.isCenter ? 18 : 17;
                                    const posWidth = d.pos.length * avgCharWidth;
                                    const posGap = 12;

                                    const line0LabelWidth = lines[0].length * avgCharWidth;
                                    let actualMaxWidth = line0LabelWidth + posGap + posWidth;
                                    for (let i = 1; i < lines.length; i++) {
                                        actualMaxWidth = Math.max(actualMaxWidth, lines[i].length * avgCharWidth);
                                    }

                                    const boxWidth = Math.min(actualMaxWidth + padding * 2, maxWidth + padding * 2);
                                    const boxHeight = lines.length * lineHeight + padding * 2;

                                    nodeGroup.append('rect')
                                        .attr('width', boxWidth).attr('height', boxHeight)
                                        .attr('x', 0).attr('y', 0)
                                        .attr('fill', '#ffffff').attr('rx', 3);

                                    const textGroup = nodeGroup.append('g').attr('transform', 'translate(12, 12)');
                                    const firstLineY = lineHeight * 0.75;
                                    textGroup.append('text')
                                        .attr('x', 0).attr('y', firstLineY)
                                        .attr('font-size', d.isCenter ? 15 : 14)
                                        .text(lines[0]);
                                    textGroup.append('text')
                                        .attr('x', line0LabelWidth + posGap).attr('y', firstLineY)
                                        .attr('font-size', d.isCenter ? 15 : 14)
                                        .attr('font-style', 'italic')
                                        .text(d.pos);
                                    for (let i = 1; i < lines.length; i++) {
                                        textGroup.append('text')
                                            .attr('x', 0).attr('y', firstLineY + i * lineHeight)
                                            .attr('font-size', d.isCenter ? 15 : 14)
                                            .text(lines[i]);
                                    }

                                    d.width = boxWidth;
                                    d.height = boxHeight;
                                });

                            nodeEnter.merge(node)
                                .attr('transform', d => `translate(${d.x - (d.width || 0)/2}, ${d.y - (d.height || 0)/2})`);
                            node.select('rect')
                                .attr('stroke', d => d.isCenter ? '#000000' : '#d1d5db')
                                .attr('stroke-width', d => d.isCenter ? 2 : 1);
                            node.exit().remove();

                            simulation.nodes(nodesArray);
                            simulation.force('link').links(linksArray);
                        });
                    });

                    simulation.alpha(isNewConcept ? 0.3 : 0.1).restart();
                }, 50);

                return () => {
                    if (rafId) cancelAnimationFrame(rafId);
                    if (timeoutId) clearTimeout(timeoutId);
                };
            }, [selectedConcept, relatedConcepts, view, visibleNodes, loadedConcepts, relationsView]);

            useEffect(() => {
                return () => {
                    if (simulationRef.current) simulationRef.current.stop();
                    nodeSizeCache.current.clear();
                };
            }, []);

            const allPosValues = ['NOUN', 'VERB', 'ADJ', 'ADV', 'CONJ', 'ADP', 'NREF', 'UNK'];

            // Loading / error states
            if (dbError) {
                return (
                    <div className="min-h-screen bg-white flex items-center justify-center p-4">
                        <div className="max-w-md">
                            <h2 className="font-bold text-xl mb-2">Error Loading Database</h2>
                            <p className="mb-4">{dbError}</p>
                            <p className="text-sm text-gray-600">
                                Make sure cygnet.db.gz is in the same directory as this HTML file.
                            </p>
                        </div>
                    </div>
                );
            }

            if (!dbReady) {
                return (
                    <div className="min-h-screen bg-white flex items-center justify-center p-4">
                        <div className="text-center w-72">
                            <h1 className="text-4xl mb-4">🦢</h1>
                            <p className="text-gray-600 mb-3">{dbProgress || 'Initializing...'}</p>
                            {downloadProgress && (
                                <div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-1">
                                        <div className="bg-blue-500 h-2 rounded-full transition-all"
                                            style={{ width: `${Math.min(100, (downloadProgress.loaded / (downloadProgress.compressedTotal * 2.5)) * 100).toFixed(0)}%` }} />
                                    </div>
                                    <p className="text-xs text-gray-500">{(downloadProgress.loaded / 1048576).toFixed(0)} MB decompressed</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Group results
            const filteredResults = getFilteredWordforms();
            const groupedByLanguageAndPos = {};
            filteredResults.forEach(sense => {
                const lang = sense.lg;
                const conceptId = sense.c?.toString();
                const concept = conceptId ? (getConceptData(conceptId) || loadConcept(conceptId)) : null;
                const pos = concept?.oc || sense.ontological_category || 'UNK';
                if (!groupedByLanguageAndPos[lang]) groupedByLanguageAndPos[lang] = {};
                if (!groupedByLanguageAndPos[lang][pos]) groupedByLanguageAndPos[lang][pos] = [];
                const existing = groupedByLanguageAndPos[lang][pos].find(g => g.conceptId === conceptId);
                if (existing) existing.senses.push(sense);
                else groupedByLanguageAndPos[lang][pos].push({ conceptId, senses: [sense] });
            });

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-3">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <button onClick={handleLogoClick} className="text-left hover:opacity-80 flex items-center gap-1.5">
                                        <h1 className="text-4xl -mt-0.5">🦢</h1>
                                        <h1 className="text-3xl font-bold text-gray-800"> Cygnet</h1>
                                    </button>
                                    <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded mt-1">SQL</span>
                                </div>
                            </div>
                            <nav className="flex items-end gap-3 mt-3 -mb-3">
                                {['browser', 'python', 'data', 'about', 'publications', 'wordnets'].map(tab => (
                                    <button key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-4 py-2 rounded-t-lg border-b-2 transition-colors ${
                                            activeTab === tab
                                                ? 'bg-gray-50 border-blue-500 text-blue-700 font-medium'
                                                : 'border-transparent text-gray-600 hover:text-gray-900 hover:bg-gray-50'
                                        }`}
                                    >{tab.charAt(0).toUpperCase() + tab.slice(1)}</button>
                                ))}
                                <div className="ml-auto relative pb-0" ref={settingsRef}>
                                    <button onClick={() => setSettingsOpen(o => !o)}
                                        title="Settings"
                                        className={`px-3 py-2 rounded-t-lg border-b-2 transition-colors relative ${settingsOpen ? 'bg-gray-50 border-blue-500 text-blue-700' : 'border-transparent text-gray-600 hover:text-gray-900 hover:bg-gray-50'}`}>
                                        ⚙
                                        {hasActiveSettings && <span className="absolute top-1.5 right-1 w-1.5 h-1.5 bg-blue-500 rounded-full" />}
                                    </button>
                                    {settingsOpen && (
                                        <div className="absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded shadow-lg z-20 w-80 max-h-[80vh] overflow-y-auto">
                                            <div className="p-4 space-y-4">
                                                <div>
                                                    <h4 className="font-semibold text-gray-500 mb-2 text-xs uppercase tracking-wide">General</h4>
                                                    <div className="space-y-2 pl-1">
                                                        <div className="flex items-center gap-2">
                                                            <label className="text-sm text-gray-600 whitespace-nowrap">Display results in</label>
                                                            <select value={definitionLanguage}
                                                                onChange={(e) => setDefinitionLanguage(e.target.value)}
                                                                className="px-2 py-0.5 border border-gray-300 rounded text-sm flex-grow min-w-0"
                                                            >
                                                                <option value="en">English</option>
                                                                {allLanguages.filter(l => l !== 'en')
                                                                    .sort((a, b) => getLangName(a).localeCompare(getLangName(b)))
                                                                    .map(lang => <option key={lang} value={lang}>{getLangFullName(lang)}</option>)}
                                                            </select>
                                                        </div>
                                                        {definitionLanguage !== 'en' && (
                                                            <p className="text-xs text-gray-400 pl-1">Labels and definitions fall back to English if unavailable</p>
                                                        )}
                                                        <label className="flex items-center gap-2 cursor-pointer">
                                                            <input type="checkbox" checked={showPronunciation}
                                                                onChange={e => { setShowPronunciation(e.target.checked); localStorage.setItem('showPronunciation', e.target.checked); }}
                                                                className="cursor-pointer" />
                                                            <span className="text-sm text-gray-600">Show pronunciation</span>
                                                        </label>
                                                        <div className="flex items-center gap-2">
                                                            <label className="text-sm text-gray-600 whitespace-nowrap">Related concepts</label>
                                                            <select value={relationsView}
                                                                onChange={e => { setRelationsView(e.target.value); localStorage.setItem('relationsView', e.target.value); }}
                                                                className="px-2 py-0.5 border border-gray-300 rounded text-sm">
                                                                <option value="graph">Graph</option>
                                                                <option value="text">Text</option>
                                                                <option value="none">Hidden</option>
                                                            </select>
                                                        </div>
                                                        <label className="flex items-center gap-2 cursor-pointer">
                                                            <input type="checkbox" checked={showProvenance}
                                                                onChange={e => {
                                                                    setShowProvenance(e.target.checked);
                                                                    localStorage.setItem('showProvenance', e.target.checked);
                                                                    if (e.target.checked && !_provDb && !provLoading) loadProvenanceDb();
                                                                }}
                                                                className="cursor-pointer" />
                                                            <span className="text-sm text-gray-600">Show provenance</span>
                                                            {showProvenance && provLoading && <span className="text-xs text-gray-400 ml-1">Loading...</span>}
                                                            {showProvenance && provError && <span className="text-xs text-red-500 ml-1">{provError}</span>}
                                                        </label>
                                                    </div>
                                                </div>
                                                <hr className="border-gray-200" />
                                                <div>
                                                    <h4 className="font-semibold text-gray-500 mb-2 text-xs uppercase tracking-wide">Search filters</h4>
                                                    <div className="space-y-3 pl-1">
                                                        <div>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="text-sm text-gray-600">Language</span>
                                                                {languageFilter.size > 0 && (
                                                                    <button onClick={() => { setLanguageFilter(new Set()); if (currentSearch) performSearch(currentSearch, new Set(), posFilter, senseFilter); }}
                                                                        className="text-xs text-blue-600 hover:underline">clear</button>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {allLanguages.sort((a, b) => getLangName(a).localeCompare(getLangName(b))).map(lang => (
                                                                    <label key={lang} className="flex items-center gap-1 cursor-pointer">
                                                                        <input type="checkbox" checked={languageFilter.has(lang)}
                                                                            onChange={() => {
                                                                                const nf = new Set(languageFilter);
                                                                                nf.has(lang) ? nf.delete(lang) : nf.add(lang);
                                                                                setLanguageFilter(nf);
                                                                                setSenseFilter(null);
                                                                                if (currentSearch) performSearch(currentSearch, nf, posFilter, null);
                                                                            }} className="cursor-pointer" />
                                                                        <span className="text-xs">{getLangFullName(lang)}</span>
                                                                    </label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="text-sm text-gray-600">Part of speech</span>
                                                                {posFilter.size > 0 && (
                                                                    <button onClick={() => { setPosFilter(new Set()); if (currentSearch) performSearch(currentSearch, languageFilter, new Set(), senseFilter); }}
                                                                        className="text-xs text-blue-600 hover:underline">clear</button>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {allPosValues.map(pos => (
                                                                    <label key={pos} className="flex items-center gap-1 cursor-pointer">
                                                                        <input type="checkbox" checked={posFilter.has(pos)}
                                                                            onChange={() => {
                                                                                const nf = new Set(posFilter);
                                                                                nf.has(pos) ? nf.delete(pos) : nf.add(pos);
                                                                                setPosFilter(nf);
                                                                                setSenseFilter(null);
                                                                                if (currentSearch) performSearch(currentSearch, languageFilter, nf, null);
                                                                            }} className="cursor-pointer" />
                                                                        <span className="text-xs">{getPosName(pos, true)}</span>
                                                                    </label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </nav>
                        </div>
                    </header>

                    <main className="w-full max-w-4xl mx-auto px-4 pt-6 pb-4 flex-grow">
                        {activeTab === 'browser' && (
                            <div>
                                {view === 'search' && (
                                    <div className="mb-8">
                                        {!senseFilter && (
                                            <div className="flex items-center gap-2">
                                                <input type="text" value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    onKeyPress={handleKeyPress}
                                                    placeholder="word, hot*, *ness, i1234, def:bright"
                                                    className="flex-grow px-3 py-2 border border-gray-300 rounded"
                                                />
                                                <div className="relative group flex-shrink-0">
                                                    <button className="w-6 h-6 rounded-full border border-gray-400 text-gray-500 text-xs font-bold hover:border-blue-500 hover:text-blue-500 flex items-center justify-center">ℹ</button>
                                                    <div className="absolute right-0 top-full mt-1 hidden group-hover:block bg-white border border-gray-200 rounded shadow-lg p-3 text-xs text-gray-700 z-30 w-64 space-y-1.5">
                                                        <div><span className="font-mono font-semibold">word</span> — exact match</div>
                                                        <div><span className="font-mono font-semibold">hot*</span> or <span className="font-mono font-semibold">*ness</span> — glob (<span className="font-mono">*</span> = any characters, <span className="font-mono">?</span> = one)</div>
                                                        <div><span className="font-mono font-semibold">i1234</span> or <span className="font-mono font-semibold">cili.i1234</span> — look up concept by ILI</div>
                                                        <div><span className="font-mono font-semibold">def:word</span> — search inside definitions</div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}


                                        {senseFilter && (
                                            <div className="mb-4 bg-blue-50 border border-blue-200 rounded p-4">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-base text-gray-700">Filtered to a single sense</span>
                                                    <button onClick={() => { setSenseFilter(null); performSearch(currentSearch, languageFilter, posFilter, null); }}
                                                        className="text-sm text-blue-600 hover:underline font-medium">Clear filter</button>
                                                </div>
                                            </div>
                                        )}

                                        {loadingResults && (
                                            <div className="flex items-center gap-3 py-6 text-gray-500">
                                                <svg className="animate-spin h-5 w-5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                                                </svg>
                                                <span>Searching{detectSearchMode(currentSearch) !== 'exact' ? ' — this may take a moment…' : '…'}</span>
                                            </div>
                                        )}

                                        {!loadingResults && currentSearch && filteredResults.length === 0 && (
                                            <div className="text-center py-8"><p className="text-gray-600">No results found for <span className="font-mono">{currentSearch}</span></p></div>
                                        )}

                                        {!loadingResults && currentSearch && filteredResults.length > 0 && (() => {
                                            const nLangs = Object.keys(groupedByLanguageAndPos).length;
                                            const showHint = filteredResults.length > 100 && (languageFilter.size === 0 || posFilter.size === 0);
                                            return (<>
                                            <div className="mt-4 mb-1 flex items-center gap-3 flex-wrap">
                                                <span className="text-sm text-gray-500">

                                                                                                                        {(() => { const li = getConceptLabel(parseInt(group.conceptId), definitionLanguage); return li ? <><span className="font-semibold text-gray-800">{li.form}</span>{li.lang !== definitionLanguage && <span className="text-xs text-gray-400 ml-0.5">[{li.lang}]</span>}{' · '}</> : null; })()}

                                                                                                                        {' '}<span className="text-gray-700">{definition}</span>{defIsFallback && <span className="text-xs text-gray-400 ml-1">[{defLang}]</span>}

                                                                                                                    {synonymsCollapsed[sense.id] === false ? '▼' : '▶'}

                                                                                                                                    className="text-blue-600 hover:underline cursor-pointer">{syn}</span>

                                                                                                        )}
                                                                                                    </div>
                                                                                                );

                                                                                        </div>
                                                                                    );
                                                                                })}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>

                                {view === 'concept' && selectedConcept && (() => {

                                                            Find path

                                                </div>

                                            {altDefs.length > 0 && (

                                                </div>

                                            <div className="mb-4">

                                                                            {renderProvenance('senses', parseInt(item.senseId))}
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                            );

                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {view === 'sense' && selectedSense && (() => {

                                    if (!sense?.l) return <div className="text-gray-600">Loading sense...</div>;
                                    return (
                                        <div>
                                            <button onClick={handleBackToSearch} className="mb-4 text-blue-600 hover:underline">← Back to search</button>
                                            <div className="mb-4">

                                                {showPronunciation && sense.p && sense.p.length > 0 && (
                                                    <div className="text-base text-gray-500 mb-1">
                                                        {sense.p.map((p, i) => (
                                                            <span key={i} className="mr-3">

                                                            </span>
                                                        ))}
                                                    </div>

                                                <p className="text-gray-600" title={getLangFullName(sense.lg)}>Language: {getLangName(sense.lg)}</p>

                                                            <div key={i}><button onClick={() => handleWordformClick(v)} className="text-blue-600 hover:underline">{v}</button></div>

                                            <div className="mb-4">
