                                            )}
                                            {sense.sr && sense.sr.length > 0 && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2">Sense Relations:</h3>
                                                    <div className="ml-2 space-y-1 text-sm">
                                                        {sense.sr.map((rel, i) => (
                                                            <div key={i}>
                                                                <span className="text-gray-600">{relationNames[rel.t] || rel.t}:</span>{' '}
                                                                <button onClick={() => handleSenseClick(rel.to)} className="text-blue-600 hover:underline">{rel.to}</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {activeTab === 'python' && <div><h2 className="text-xl font-bold mb-4">Python Module</h2><p className="text-gray-600">Coming soon.</p></div>}
                        {activeTab === 'data' && (
                            <div>
                                <h2 className="text-xl font-bold mb-4">Data Download</h2>
                                <p className="text-gray-700 mb-6">
                                    The Cygnet databases are available for download below. Both are SQLite databases compressed with gzip.
                                </p>
                                <ul className="space-y-4 mb-8">
                                    <li className="text-sm text-gray-800">
                                        <a href="https://github.com/rowanhm/cygnet/releases/latest/download/cygnet.db.gz" className="text-blue-600 hover:underline font-medium">cygnet.db.gz</a>
                                        {' '}— The main lexical database, containing synsets, entries, senses, definitions, examples, and pronunciations across all languages.
                                    </li>
                                    <li className="text-sm text-gray-800">
                                        <a href="https://github.com/rowanhm/cygnet/releases/latest/download/provenance.db.gz" className="text-blue-600 hover:underline font-medium">provenance.db.gz</a>
                                        {' '}— Provenance records tracing every data point back to its source wordnet and original identifier.
                                    </li>
                                </ul>
                                <p className="text-gray-700 mb-4">
                                    The individual wordnets that make up Cygnet are each available from their respective projects — see the <button onClick={() => setActiveTab('wordnets')} className="text-blue-600 hover:underline">Wordnets</button> tab for the full list with links.
                                </p>
                                <p className="text-gray-700">
                                    Source code for merging and displaying wordnets is available on <a href="https://github.com/rowanhm/cygnet" className="text-blue-600 hover:underline">GitHub</a>.
                                </p>
                            </div>
                        )}
                        {activeTab === 'about' && (
                            <div>
                                <h2 className="text-xl font-bold mb-4">About</h2>
                                <p className="text-gray-700 mb-4">
                                    OMW Cygnet is an experimental reformulation of Wordnet that is designed to eliminate conflicting records, and improve modularity. It extends the idea of the <a href="https://omwn.org/" className="text-blue-600 hover:underline">Open Multilingual Wordnet</a> and puts concepts at the core of the structure.
                                </p>
                                <p className="text-gray-700 mb-4">
                                    Developed by Rowan Hall Maudslay and Francis Bond. Source code is available on <a href="https://github.com/rowanhm/cygnet" className="text-blue-600 hover:underline">GitHub</a>.
                                </p>
                                {dbStats && (
                                    <div className="border-t border-gray-200 pt-4 mb-4">
                                        <h3 className="font-medium text-sm text-gray-700 mb-3">Database statistics</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                            {[
                                                ['Concepts',  dbStats.synsets],
                                                ['Entries',   dbStats.entries],
                                                ['Senses',    dbStats.senses],
                                                ['Languages', dbStats.languages],
                                            ].map(([label, n]) => (
                                                <div key={label} className="bg-gray-50 rounded p-3 text-center">
                                                    <div className="text-lg font-semibold text-gray-800">{n?.toLocaleString()}</div>
                                                    <div className="text-xs text-gray-500 mt-0.5">{label}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="border-t border-gray-200 pt-4">
                                    <h3 className="font-medium text-sm text-gray-700 mb-2">Cache</h3>
                                    <p className="text-sm text-gray-500 mb-2">
                                        The database is cached locally in your browser to avoid re-downloading on each visit.
                                    </p>
                                    <button
                                        onClick={async () => {
                                            if (confirm('Clear cached database? It will be re-downloaded on next page load.')) {
                                                await idbClear();
                                                _provDb = null;
                                                location.reload();
                                            }
                                        }}
                                        className="text-sm text-red-600 hover:text-red-800 underline"
                                    >Clear cached database</button>
                                </div>
                            </div>
                        )}
                        {activeTab === 'publications' && (
                            <div>
                                <h2 className="text-xl font-bold mb-4">Publications</h2>
                                <ul className="space-y-4">
                                    <li className="text-sm text-gray-800">
                                        Rowan Hall Maudslay &amp; Francis Bond (2026). Cygnet: Refactoring the Open Multilingual Wordnet. In <em>Proceedings of the 15th International Conference on Language Resources and Evaluation (LREC 2026)</em>. (to appear)
                                    </li>
                                    <li className="text-sm text-gray-800">
                                        Francis Bond &amp; Ryan Foster (2013). Linking and extending an open multilingual wordnet. In <em>Proceedings of the 51st Annual Meeting of the Association for Computational Linguistics (ACL 2013)</em>. Sofia. pp. 1352–1362.
                                    </li>
                                    <li className="text-sm text-gray-800">
                                        Francis Bond &amp; Kyonghee Paik (2012). A survey of wordnets and their licenses. In <em>Proceedings of the 6th Global WordNet Conference (GWC 2012)</em>. Matsue. pp. 64–71.
                                    </li>
                                </ul>
                            </div>
                        )}
                        {activeTab === 'wordnets' && (() => {
                            const shortLicence = (url) => {
                                if (!url) return null;
                                const cc = url.match(/creativecommons\.org\/licenses\/([\w-]+)\/([\d.]+)/);
                                if (cc) return `CC ${cc[1].toUpperCase()} ${cc[2]}`;
                                if (/opendatacommons\.org.*odc-by|\/odc-by\//i.test(url)) return 'ODC BY';
                                const cecill = url.match(/Licence_(CeCILL[^_]*)_V(\d+)/i);
                                if (cecill) return `${cecill[1]} V${cecill[2]}`;
                                if (/apache/i.test(url)) return 'Apache 2.0';
                                if (url === 'wordnet') return 'WordNet';
                                return url;
                            };
                            const sortResources = (col) => setWnSort(s => ({ col, asc: s.col === col ? !s.asc : true }));
                            const sortedResources = (() => {
                                if (!wnSort.col) return allResources;
                                const key = { Language: r => getLangFullName(r.language) || '', Name: r => r.label || r.code || '', Concepts: r => r.synset_count ?? -1, Senses: r => r.sense_count ?? -1, Version: r => r.version || '', Licence: r => shortLicence(r.licence) || '' }[wnSort.col];
                                return [...allResources].sort((a, b) => {
                                    const av = key(a), bv = key(b);
                                    const cmp = typeof av === 'number' ? av - bv : av.localeCompare(bv);
                                    return wnSort.asc ? cmp : -cmp;
                                });
                            })();
                            const SortTh = ({ col, right }) => {
                                const active = wnSort.col === col;
                                return <th className={`px-3 py-2 border border-gray-200 cursor-pointer select-none hover:bg-gray-200${right ? ' text-right' : ''}`} onClick={() => sortResources(col)}>{col}{active ? (wnSort.asc ? ' ▲' : ' ▼') : ''}</th>;
                            };
                            return (
                            <div>
                                <h2 className="text-xl font-bold mb-4">Contributing Wordnets</h2>
                                {allResources.length === 0 ? (
                                    <p className="text-gray-600">No resource metadata available.</p>
                                ) : (
                                    <table className="w-full text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-gray-100 text-left">
                                                <SortTh col="Language"/>
                                                <SortTh col="Name"/>
                                                <SortTh col="Concepts" right/>
                                                <SortTh col="Senses" right/>
                                                <SortTh col="Version"/>
                                                <th className="px-3 py-2 border border-gray-200">Citation</th>
                                                <SortTh col="Licence"/>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sortedResources.map((r, i) => (
                                                <tr key={r.code}
                                                    ref={r.code === highlightedResource ? highlightedRowRef : null}
                                                    className={r.code === highlightedResource ? 'bg-yellow-100' : (i % 2 === 0 ? 'bg-white' : 'bg-gray-50')}>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">
                                                        {r.language
                                                            ? <span title={r.language} className="cursor-help">{getLangFullName(r.language)}</span>
                                                            : '—'}
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 font-medium">
                                                        {r.url
                                                            ? <a href={r.url} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{r.label || r.code}</a>
                                                            : (r.label || r.code)}
                                                        <button onClick={() => setInfoPopup(r)}
                                                                className="float-right text-blue-600 hover:text-blue-800"
                                                                title="Show full metadata">ⓘ</button>
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 text-right tabular-nums">{r.synset_count != null ? r.synset_count.toLocaleString() : '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200 text-right tabular-nums">{r.sense_count != null ? r.sense_count.toLocaleString() : '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">{r.version || '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200">
                                                        {r.citation
                                                            ? <details><summary className="cursor-pointer text-blue-600 hover:underline list-none w-fit">cite</summary><p className="mt-1 text-xs text-gray-600 max-w-sm">{r.citation}</p></details>
                                                            : '—'}
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">
                                                        {r.licence
                                                            ? <a href={r.licence} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{shortLicence(r.licence)}</a>
                                                            : '—'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                            );
                        })()}
                    </main>

                    <footer className="mt-auto py-4">
                        <div className="max-w-4xl mx-auto px-4 border-t border-gray-200 pt-4 text-center text-sm text-gray-600">
                            <span>Cygnet — SQL interface</span>
                        </div>
                    </footer>

                    {infoPopup && (() => {
                        const r = infoPopup;
                        const extra = (() => { try { return r.extra ? JSON.parse(r.extra) : null; } catch(e) { return null; } })();
                        const rows = [
                            ['ID',          r.code],
                            ['Language',    r.language ? `${getLangFullName(r.language)} (${r.language})` : null],
                            ['Version',     r.version],
                            ['URL',         r.url],
                            ['Licence',     r.licence],
                            ['Email',       r.email],
                            ['Status',      r.status],
                            ['Confidence',  r.confidence_score != null ? r.confidence_score : null],
                            ['Citation',    r.citation],
                            ...(extra ? Object.entries(extra).map(([k, v]) => [k.replace(/^.*[/:}]/, ''), v]) : []),
                        ].filter(([, v]) => v != null && v !== '');
                        return (
                            <div className="fixed inset-0 z-50 flex items-center justify-center"
                                 onClick={() => setInfoPopup(null)}>
                                <div className="absolute inset-0 bg-black opacity-40" />
                                <div className="relative bg-white rounded-lg shadow-xl w-full max-w-lg mx-4 p-6 max-h-[80vh] overflow-y-auto"
                                     onClick={e => e.stopPropagation()}>
                                    <div className="flex items-start justify-between mb-4">
                                        <h3 className="text-lg font-bold text-gray-900">{r.label || r.code}</h3>
                                        <button onClick={() => setInfoPopup(null)}
                                                className="text-gray-400 hover:text-gray-600 text-xl leading-none ml-4">✕</button>
                                    </div>
                                    <dl className="space-y-2 text-sm">
                                        {rows.map(([label, value]) => (
                                            <div key={label} className="grid grid-cols-[7rem_1fr] gap-2">
                                                <dt className="font-medium text-gray-500">{label}</dt>
                                                <dd className="text-gray-800 break-words">
                                                    {/^https?:\/\//.test(value)
                                                        ? <a href={value} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{value}</a>
                                                        : value}
                                                </dd>
                                            </div>
                                        ))}
                                    </dl>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DictionaryBrowser />);
    </script>
</body>
</html>
