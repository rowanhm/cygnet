                                                                                                                    </div>
                                                                                                                )}
                                                                                                                {!sense.v?.length && synonyms.length === 0 && !sense.ex?.length && (
                                                                                                                    <div className="text-sm text-gray-600 italic">No additional information</div>
                                                                                                                )}
                                                                                                            </div>
                                                                                                        )}
                                                                                                    </div>
                                                                                                );
                                                                                            })}
                                                                                        </div>
                                                                                    );
                                                                                })}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {view === 'concept' && selectedConcept && (() => {
                                    const concept = getConceptData(selectedConcept) || loadConcept(selectedConcept);
                                    if (!concept) return <div className="text-gray-600">Loading concept...</div>;

                                    // Load senses
                                    if (concept.s) {
                                        Object.values(concept.s).flat().forEach(sid => {
                                            if (!loadedSenses[sid.toString()]) loadSenseData(sid.toString());
                                        });
                                    }

                                    const mainDef = concept.d?.en || '(No English definition available)';
                                    const altDefs = concept.d ? Object.entries(concept.d).filter(([l]) => l !== 'en') : [];

                                    return (
                                        <div>
                                            <button onClick={handleBackToSearch} className="mb-4 text-blue-600 hover:underline">← Back to search</button>
                                            <div className="mb-4">
                                                <p className="text-base">
                                                    <span className="text-gray-600 italic">{getPosName(concept.oc)}.</span>{' '}
                                                    {concept.da ? renderDefinitionWithLinks(mainDef, concept.da) : mainDef}
                                                </p>
                                            </div>

                                            {relationsMap && hasRelationsToDisplay && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2 text-base">Related Concepts:</h3>
                                                    <div style={{ position: 'relative', overflow: 'hidden' }}>
                                                        <div id="concept-graph" style={{ width: '100%', height: '500px' }} />
                                                        <div className="text-sm text-gray-600 italic mt-2">Hover over a node to expand its relations.</div>
                                                        {hoveredNode && hoverMenuPosition && (
                                                            <div style={{
                                                                position: 'absolute', left: hoverMenuPosition.x, top: hoverMenuPosition.y,
                                                                zIndex: 1000, pointerEvents: 'auto',
                                                                maxWidth: `calc(100% - ${hoverMenuPosition.x}px)`,
                                                                maxHeight: `${500 - hoverMenuPosition.y}px`, overflow: 'hidden'
                                                            }}>
                                                                <div ref={menuRef}
                                                                    onMouseEnter={() => { if (hoverTimeoutRef.current) { clearTimeout(hoverTimeoutRef.current); hoverTimeoutRef.current = null; } }}
                                                                    onMouseLeave={() => { hoverTimeoutRef.current = setTimeout(() => { setHoveredNode(null); setHoverMenuPosition(null); }, 100); }}
                                                                    className="bg-white border-2 border-gray-400 rounded shadow-lg p-2 text-sm min-w-[150px]">
                                                                    <div className="font-semibold mb-2 text-gray-700 text-xs">Relations:</div>
                                                                    {getAvailableCategories(hoveredNode).map(category => {
                                                                        const isSelected = selectedCategories[hoveredNode]?.has(category);
                                                                        return (
                                                                            <button key={category} onClick={() => handleCategorySelect(hoveredNode, category)}
                                                                                className={`block w-full text-left px-2 py-1 rounded flex items-center gap-2 ${isSelected ? 'bg-blue-100 text-blue-700' : 'hover:bg-gray-100'}`}>
                                                                                <span className="w-4">{isSelected ? '☑' : '☐'}</span>
                                                                                <span>{category.charAt(0).toUpperCase() + category.slice(1)}</span>
                                                                            </button>
                                                                        );
                                                                    })}
                                                                    {getAvailableCategories(hoveredNode).length === 0 && (
                                                                        <div className="text-gray-500 italic px-2">No relations</div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {altDefs.length > 0 && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2 text-base">Alternative definitions:</h3>
                                                    <div className="space-y-1 ml-2">
                                                        {altDefs.map(([lang, def]) => (
                                                            <div key={lang} className="text-sm">
                                                                <span className="font-semibold text-gray-700">{getLangName(lang)}:</span> {def}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            <div className="mb-4">
                                                <h3 className="font-bold mb-2 text-base">All forms expressing this concept:</h3>
                                                <div className="space-y-1 ml-2">
                                                    {concept.s && Object.entries(concept.s)
                                                        .sort(([a], [b]) => getLangName(a).localeCompare(getLangName(b)))
                                                        .map(([lang, senseIds]) => {
                                                            const lemmas = senseIds.map(sid => {
                                                                const sd = loadedSenses[sid.toString()];
                                                                return sd ? { lemma: sd.l, senseId: sid.toString() } : null;
                                                            }).filter(Boolean);
                                                            return (
                                                                <div key={lang} className="text-sm">
                                                                    <span className="font-semibold text-gray-700">{getLangName(lang)}:</span>{' '}
                                                                    {lemmas.map((item, idx) => (
                                                                        <span key={item.senseId}>{idx > 0 && ', '}
                                                                            <button onClick={() => handleWordformClickWithSense(item.lemma, item.senseId)}
                                                                                className="text-blue-600 hover:underline">{item.lemma}</button>
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                            );
                                                        })}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {view === 'sense' && selectedSense && (() => {
                                    const sense = loadedSenses[selectedSense] || loadSenseData(selectedSense);
                                    if (!sense?.l) return <div className="text-gray-600">Loading sense...</div>;
                                    return (
                                        <div>
                                            <button onClick={handleBackToSearch} className="mb-4 text-blue-600 hover:underline">← Back to search</button>
                                            <div className="mb-4">
                                                <h2 className="text-2xl font-bold mb-2">{sense.l}</h2>
                                                <p className="text-gray-600">Language: {getLangName(sense.lg)}</p>
                                            </div>
                                            {sense.v && sense.v.length > 0 && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2">Variants:</h3>
                                                    <div className="ml-2 space-y-1">
                                                        {sense.v.map((v, i) => (
                                                            <div key={i}><button onClick={() => handleWordformClick(v)} className="text-blue-600 hover:underline">{v}</button></div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            <div className="mb-4">
                                                <h3 className="font-bold mb-2">Concept:</h3>
                                                <button onClick={() => handleConceptClick(sense.c)} className="text-blue-600 hover:underline">{sense.c}</button>
                                            </div>
                                            {sense.ex && sense.ex.length > 0 && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2">Examples:</h3>
                                                    <div className="ml-2 space-y-1">
                                                        {sense.ex.map((ex, i) => (
                                                            <div key={i} className="text-gray-700">"{renderExample(ex)}"</div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            {sense.sr && sense.sr.length > 0 && (
                                                <div className="mb-4">
                                                    <h3 className="font-bold mb-2">Sense Relations:</h3>
                                                    <div className="ml-2 space-y-1 text-sm">
                                                        {sense.sr.map((rel, i) => (
                                                            <div key={i}>
                                                                <span className="text-gray-600">{relationNames[rel.t] || rel.t}:</span>{' '}
                                                                <button onClick={() => handleSenseClick(rel.to)} className="text-blue-600 hover:underline">{rel.to}</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {activeTab === 'python' && <div><h2 className="text-xl font-bold mb-4">Python Module</h2><p className="text-gray-600">Coming soon.</p></div>}
                        {activeTab === 'data' && <div><h2 className="text-xl font-bold mb-4">Data Download</h2><p className="text-gray-600">Coming soon.</p></div>}
                        {activeTab === 'about' && <div><h2 className="text-xl font-bold mb-4">About</h2><p className="text-gray-600">Coming soon.</p></div>}
                        {activeTab === 'publications' && <div><h2 className="text-xl font-bold mb-4">Publications</h2><p className="text-gray-600">Coming soon.</p></div>}
                    </main>

                    <footer className="mt-auto py-4">
                        <div className="max-w-4xl mx-auto px-4 border-t border-gray-200 pt-4 text-center text-sm text-gray-600">
                            <span>Cygnet — SQL interface</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DictionaryBrowser />);
    </script>
</body>
</html>
